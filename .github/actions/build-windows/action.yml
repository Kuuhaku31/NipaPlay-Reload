name: 'Build Windows Package'
description: '构建 Windows 应用并生成 ZIP、MSIX 包 和安装程序'
inputs:
  app-version:
    description: '应用版本号'
    required: true
outputs:
  zip-path:
    description: '生成的 ZIP 文件路径'
    value: ${{ steps.build.outputs.zip_path }}
  installer-path:
    description: '生成的安装程序路径'
    value: ${{ steps.installer.outputs.installer_path }}
runs:
  using: 'composite'
  steps:
    - name: Precache Flutter Windows artifacts
      shell: pwsh
      run: flutter precache --windows

    - name: Setup Rust for Erika native core
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Setup MSYS2 tools for Erika native dependencies
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        # Operate on the runner's pre-installed C:\msys64 (the path Erika's xtask
        # and the check below hard-code) instead of a fresh MSYS2 under RUNNER_TEMP,
        # so the installed packages land in C:\msys64\usr\bin.
        release: false
        update: false
        path-type: inherit
        install: >-
          make
          tar
          diffutils
          coreutils
          pkgconf
          perl

    - name: Configure Erika Windows native build
      shell: pwsh
      run: |
        git config --global core.longpaths true
        "CARGO_NET_GIT_FETCH_WITH_CLI=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        $llvmBin = "C:\Program Files\LLVM\bin"
        $msysLlvmBin = "C:\msys64\mingw64\bin"
        if (-not (Test-Path (Join-Path $llvmBin "libclang.dll")) -and
            -not (Test-Path (Join-Path $msysLlvmBin "libclang.dll"))) {
          choco install llvm -y --no-progress
        }

        if (Test-Path (Join-Path $llvmBin "libclang.dll")) {
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Add-Content -Path $env:GITHUB_PATH -Value $llvmBin
        } elseif (Test-Path (Join-Path $msysLlvmBin "libclang.dll")) {
          "LIBCLANG_PATH=$msysLlvmBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Add-Content -Path $env:GITHUB_PATH -Value $msysLlvmBin
        } else {
          throw "libclang.dll was not found after installing LLVM"
        }

        rustc --version
        cargo --version
        if (-not (Test-Path "C:\msys64\usr\bin\sh.exe")) {
          throw "MSYS2 sh.exe was not found"
        }
        if (-not (Test-Path "C:\msys64\usr\bin\make.exe")) {
          throw "MSYS2 make.exe was not found"
        }
        if (-not (Test-Path "C:\msys64\usr\bin\false.exe")) {
          throw "MSYS2 false.exe was not found"
        }

    - name: Cache Erika Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: windows-erika-cargo-${{ env.ERIKA_SHA || hashFiles('pubspec.lock') }}-v1
        restore-keys: |
          windows-erika-cargo-${{ env.ERIKA_SHA }}-
          windows-erika-cargo-

    - name: Restore Erika native dependency bundle
      id: restore-erika-native-deps
      uses: actions/cache/restore@v4
      with:
        path: |
          ~/.pub-cache/git/Erika-*/third_party/dist/x86_64-pc-windows-msvc/lgpl
        key: windows-erika-native-x86_64-pc-windows-msvc-lgpl-${{ env.ERIKA_SHA || hashFiles('pubspec.lock') }}-v1
        restore-keys: |
          windows-erika-native-x86_64-pc-windows-msvc-lgpl-

    - name: Restore Erika native source archives
      id: restore-erika-native-sources
      uses: actions/cache/restore@v4
      with:
        path: ~/.pub-cache/git/Erika-*/third_party/cache
        key: windows-erika-native-sources-v1

    - name: Setup Chinese Font for Windows
      shell: pwsh
      run: |
        Write-Host "Setting up Chinese font for Windows build..."
        cd windows
        if (Test-Path "setup_font.bat") {
          Write-Host "Executing setup_font.bat..."
          cmd /c "setup_font.bat"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Warning: Font setup failed with exit code $LASTEXITCODE"
          } else {
            Write-Host "Font setup completed successfully"
          }
        } else {
          Write-Host "Warning: setup_font.bat not found, skipping font setup"
        }
        cd ..
    
    - name: Pre-download FVP mdk-sdk (workaround symlink extraction issue)
      shell: pwsh
      run: |
        # FVP's deps.cmake extracts mdk-sdk into CMAKE_CURRENT_SOURCE_DIR, which
        # resolves through Flutter's .plugin_symlinks to a UNC path (\\?\D:\...).
        # CMake's "cmake -E tar" cannot extract 7z archives through such paths.
        # Workaround: pre-download and extract mdk-sdk into the real FVP package
        # directory so that deps.cmake detects it and skips extraction.
        $fvpDirs = Get-ChildItem -Path "$env:LOCALAPPDATA\Pub\Cache\hosted\pub.dev\fvp-*" -Directory -ErrorAction SilentlyContinue
        if (-not $fvpDirs) {
          # Fallback: try .pub-cache (older Flutter)
          $fvpDirs = Get-ChildItem -Path "$env:USERPROFILE\.pub-cache\hosted\pub.dev\fvp-*" -Directory -ErrorAction SilentlyContinue
        }
        if (-not $fvpDirs) {
          Write-Host "FVP package not found in pub cache; will rely on CMake extraction."
          return
        }
        $fvpDir = $fvpDirs[0].FullName
        $mdkSdkDir = Join-Path $fvpDir "windows\mdk-sdk"
        $findMdk = Join-Path $mdkSdkDir "lib\cmake\FindMDK.cmake"
        if (Test-Path $findMdk) {
          Write-Host "mdk-sdk already exists at $mdkSdkDir; skipping pre-download."
          return
        }

        $mdkSdkPkg = "mdk-sdk-windows-desktop-vs2022-x64.7z"
        $archivePath = Join-Path $fvpDir "windows\$mdkSdkPkg"

        # SourceForge intermittently serves an HTML interstitial/anti-bot page
        # to CI runners instead of the 7z archive, which makes 7-Zip fail with
        # "Is not archive". Download from several mirrors and validate the 7z
        # magic bytes (37 7A BC AF 27 1C) before extracting; fall back to the
        # GitHub release asset (which fvp's deps.cmake cannot use directly
        # because it hardcodes the vs2022-x64 filename that only SourceForge has).
        $sig = [byte[]](0x37, 0x7a, 0xbc, 0xaf, 0x27, 0x1c)
        $ua = @{ "User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" }

        function Test-SevenZip {
          param([string]$Path)
          if (-not (Test-Path $Path)) { return $false }
          $bytes = [System.IO.File]::ReadAllBytes($Path)
          if ($bytes.Length -lt 6) { return $false }
          for ($i = 0; $i -lt 6; $i++) { if ($bytes[$i] -ne $sig[$i]) { return $false } }
          return $true
        }

        $candidates = @(
          "https://sourceforge.net/projects/mdk-sdk/files/nightly/$mdkSdkPkg/download",
          "https://downloads.sourceforge.net/project/mdk-sdk/nightly/$mdkSdkPkg",
          "https://master.dl.sourceforge.net/project/mdk-sdk/nightly/$mdkSdkPkg"
        )

        $downloaded = $false
        foreach ($url in $candidates) {
          foreach ($attempt in 1..3) {
            Write-Host "Downloading mdk-sdk from $url (attempt $attempt) ..."
            try {
              Invoke-WebRequest -Uri $url -OutFile $archivePath -UseBasicParsing -TimeoutSec 180 -Headers $ua
            } catch {
              Write-Warning "Download error from $url : $($_.Exception.Message)"
              continue
            }
            if (Test-SevenZip $archivePath) {
              Write-Host "Got valid 7z archive from $url"
              $downloaded = $true
              break
            }
            $len = (Get-Item $archivePath).Length
            Write-Warning "Response from $url was not a 7z archive (size=$len bytes, likely HTML interstitial); retrying."
            Remove-Item $archivePath -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
          }
          if ($downloaded) { break }
        }

        if (-not $downloaded) {
          $ghPkg = "mdk-sdk-windows-x64.7z"
          $ghUrl = "https://github.com/wang-bin/mdk-sdk/releases/latest/download/$ghPkg"
          $archivePath = Join-Path $fvpDir "windows\$ghPkg"
          Write-Host "SourceForge mirrors unavailable; falling back to GitHub release $ghUrl ..."
          Invoke-WebRequest -Uri $ghUrl -OutFile $archivePath -UseBasicParsing -TimeoutSec 180 -Headers $ua
          if (-not (Test-SevenZip $archivePath)) {
            throw "GitHub fallback download was not a valid 7z archive: $archivePath"
          }
        }

        # Extract using 7-Zip (CMake's tar can't handle 7z on Windows reliably)
        $sevenZip = Join-Path ${env:ProgramFiles} "7-Zip\7z.exe"
        if (-not (Test-Path $sevenZip)) {
          choco install 7zip -y --no-progress
        }
        $windowsDir = Join-Path $fvpDir "windows"
        Write-Host "Extracting mdk-sdk to $windowsDir ..."
        & $sevenZip x $archivePath "-o$windowsDir" -y | Out-Null

        if (Test-Path $findMdk) {
          Write-Host "mdk-sdk pre-downloaded and extracted successfully."
        } else {
          throw "mdk-sdk extraction failed; FindMDK.cmake not found at $findMdk"
        }

    - name: Build Web and copy assets
      shell: bash
      run: |
        chmod +x build_and_copy_web.sh
        ./build_and_copy_web.sh

    - name: Refresh Pub dependencies (post-web build)
      shell: bash
      run: |
        if [ ! -f "pubspec.lock" ]; then
          echo "❌ pubspec.lock 不存在，无法使用 --enforce-lockfile。"
          echo "当前目录: $(pwd)"
          ls -la
          exit 1
        fi
        flutter pub get --enforce-lockfile

    - name: Download full libmpv package
      shell: pwsh
      run: |
        $customUrl = $env:LIBMPV_DOWNLOAD_URL
        $assetPattern = $env:LIBMPV_ASSET_PATTERN
        if ([string]::IsNullOrEmpty($assetPattern)) {
          $assetPattern = "mpv-dev-x86_64-v3.*\.7z"
        }
        choco install 7zip -y --no-progress
        $sevenZip = $null
        if ($env:ProgramFiles) {
          $candidate = Join-Path $env:ProgramFiles "7-Zip\7z.exe"
          if (Test-Path $candidate) {
            $sevenZip = $candidate
          }
        }
        if (-not $sevenZip -and ${env:ProgramFiles(x86)}) {
          $candidate = Join-Path ${env:ProgramFiles(x86)} "7-Zip\7z.exe"
          if (Test-Path $candidate) {
            $sevenZip = $candidate
          }
        }
        if (-not $sevenZip) {
          throw "未找到 7z.exe，请确保 7zip 安装成功"
        }
        $packagePath = "windows\libmpv-package.7z"
        $extractDir = "windows\libmpv-package"
        Remove-Item $packagePath -Force -ErrorAction SilentlyContinue
        Remove-Item $extractDir -Recurse -Force -ErrorAction SilentlyContinue
        New-Item -Path $extractDir -ItemType Directory -Force | Out-Null
        if ([string]::IsNullOrEmpty($customUrl)) {
          $releaseApi = "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          $headers = @{
            "User-Agent" = "NipaPlay-Build"
            "Accept"    = "application/vnd.github+json"
          }
          if ($env:GITHUB_TOKEN) {
            $headers["Authorization"] = "Bearer $($env:GITHUB_TOKEN)"
          }
          try {
            $release = Invoke-RestMethod -Uri $releaseApi -Headers $headers -UseBasicParsing
          } catch {
            throw "获取 mpv 最新版本信息失败：$($_.Exception.Message)"
          }
          $asset = $release.assets | Where-Object { $_.name -match $assetPattern } | Select-Object -First 1
          if (-not $asset) {
            $fallbackPattern = "mpv-dev-x86_64.*\.7z"
            $asset = $release.assets | Where-Object { $_.name -match $fallbackPattern } | Select-Object -First 1
          }
          if (-not $asset) {
            $fallbackPattern = "libmpv-shared-x86_64.*\.7z"
            $asset = $release.assets | Where-Object { $_.name -match $fallbackPattern } | Select-Object -First 1
          }
          if (-not $asset) {
            throw "未在 mpv 最新 release 中找到匹配的 libmpv 包"
          }
          $customUrl = $asset.browser_download_url
          Write-Host "选用 libmpv 资源：$($asset.name)"
        } else {
          Write-Host "使用自定义 libmpv 下载地址：$customUrl"
        }
        Write-Host "开始下载 libmpv 包：$customUrl"
        Invoke-WebRequest -Uri $customUrl -OutFile $packagePath -UseBasicParsing
        & $sevenZip x $packagePath "-o$extractDir" -y | Out-Null
        $dll = Get-ChildItem -Path $extractDir -Recurse -Filter "libmpv-2.dll" | Select-Object -First 1
        if (-not $dll) {
          throw "libmpv 包中未找到 libmpv-2.dll"
        }
        Copy-Item -Path $dll.FullName -Destination "windows\libmpv-2.dll" -Force
        Remove-Item $packagePath -Force -ErrorAction SilentlyContinue
        Write-Host "libmpv-2.dll 已下载并可用于后续打包"
    
    - name: Build Windows
      id: build
      shell: pwsh
      run: |
        function Show-ErikaNativeDiagnostics {
          Write-Host "::group::Erika native diagnostics"
          try {
            $patterns = @()
            if ($env:LOCALAPPDATA) {
              $patterns += Join-Path $env:LOCALAPPDATA "Pub\Cache\git\Erika-*"
            }
            if ($env:USERPROFILE) {
              $patterns += Join-Path $env:USERPROFILE ".pub-cache\git\Erika-*"
            }
            $patterns += "windows\flutter\ephemeral\.plugin_symlinks\erika_flutter"

            $roots = @()
            foreach ($pattern in $patterns) {
              $roots += Get-ChildItem -Path $pattern -Directory -ErrorAction SilentlyContinue
            }
            if (-not $roots) {
              Write-Host "No Erika checkout found in Pub cache or plugin symlinks."
              return
            }

            $roots = $roots | Sort-Object FullName -Unique
            foreach ($root in $roots) {
              Write-Host "Erika root: $($root.FullName)"
              $thirdParty = Join-Path $root.FullName "third_party"
              if (-not (Test-Path $thirdParty)) {
                Write-Host "third_party directory is missing."
                continue
              }

              Write-Host "third_party top-level directories:"
              Get-ChildItem -Path $thirdParty -Directory -ErrorAction SilentlyContinue |
                Select-Object -First 20 |
                ForEach-Object { Write-Host "  $($_.FullName)" }

              $metadataFiles = Get-ChildItem -Path $thirdParty -Recurse -File -Filter "erika-native-deps.txt" -ErrorAction SilentlyContinue
              foreach ($file in $metadataFiles) {
                Write-Host "--- $($file.FullName) ---"
                Get-Content -Path $file.FullName -Tail 200 -ErrorAction SilentlyContinue
              }

              $logFiles = Get-ChildItem -Path $thirdParty -Recurse -File -ErrorAction SilentlyContinue |
                Where-Object {
                  $_.FullName -match "[\\/]ffbuild[\\/]config\.log$" -or
                  $_.Name -in @("config.log", "build.log")
                } |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 8
              foreach ($file in $logFiles) {
                Write-Host "--- tail $($file.FullName) ---"
                Get-Content -Path $file.FullName -Tail 300 -ErrorAction SilentlyContinue
              }
            }
          } finally {
            Write-Host "::endgroup::"
          }
        }

        # --obfuscate + --split-debug-info：Dart 代码混淆 + 分离调试符号（体积↓ + 反逆向）
        # symbol map 由 workflow 的 dart-symbols-* artifact 上传，用于 crash stack 反混淆
        $flutterArgs = @(
          "build",
          "windows",
          "--release",
          "--no-pub",
          "--obfuscate",
          "--split-debug-info=build/symbols-windows"
        )
        if ($env:NIPAPLAY_VERBOSE_WINDOWS_BUILD -ne "0") {
          $flutterArgs += "--verbose"
        }
        Write-Host "Running: flutter $($flutterArgs -join ' ')"
        & flutter @flutterArgs
        $flutterExitCode = $LASTEXITCODE
        if ($flutterExitCode -ne 0) {
          Show-ErikaNativeDiagnostics
          throw "flutter build windows failed with exit code $flutterExitCode"
        }

        $arch = "x64"
        $version = "${{ inputs.app-version }}"
        $DestDir = "build\windows\NipaPlay_${version}_Windows_x64"
        $SrcDir = "build\windows\x64\runner\Release"
        $CustomLib = "windows\libmpv-2.dll"
        if (!(Test-Path $SrcDir)) {
          throw "Windows 构建输出目录不存在：$SrcDir"
        }
        if (!(Test-Path $CustomLib)) {
          throw "未找到内置的完整版 libmpv：$CustomLib"
        }
        Copy-Item -Path $CustomLib -Destination "$SrcDir\libmpv-2.dll" -Force
        Write-Host "已将构建输出中的 libmpv-2.dll 替换为完整版"
        New-Item -Path $DestDir -ItemType Directory -Force
        Copy-Item -Path "$SrcDir\*" -Destination $DestDir -Recurse -Force
        Copy-Item -Path "windows\*.dll" -Destination $DestDir -Force
        $zipPath = "build\windows\NipaPlay_${version}_Windows_x64.zip"
        Compress-Archive -Path $DestDir -DestinationPath $zipPath -Force
        echo "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

    - name: Save Erika native dependency bundle
      if: steps.restore-erika-native-deps.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          ~/.pub-cache/git/Erika-*/third_party/dist/x86_64-pc-windows-msvc/lgpl
        key: ${{ steps.restore-erika-native-deps.outputs.cache-primary-key }}

    - name: Save Erika native source archives
      if: always() && steps.restore-erika-native-sources.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ~/.pub-cache/git/Erika-*/third_party/cache
        key: ${{ steps.restore-erika-native-sources.outputs.cache-primary-key }}

    - name: Install Inno Setup
      shell: pwsh
      run: |
        choco install innosetup --no-progress -y

    - name: Ensure Inno Setup Chinese language file
      shell: pwsh
      run: |
        $langFile = Join-Path "${env:ProgramFiles(x86)}" "Inno Setup 6\Languages\ChineseSimplified.isl"
        if (-not (Test-Path $langFile)) {
          Write-Host "ChineseSimplified.isl 缺失，尝试下载..."
          $langDir = Split-Path $langFile -Parent
          New-Item -ItemType Directory -Path $langDir -Force | Out-Null
          $urls = @(
            "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl",
            "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl",
            "https://raw.githubusercontent.com/jrsoftware/issrc/master/Files/Languages/ChineseSimplified.isl",
            "https://raw.githubusercontent.com/jrsoftware/issrc/master/Files/Languages/Unofficial/ChineseSimplified.isl"
          )
          foreach ($u in $urls) {
            try {
              Invoke-WebRequest -Uri $u -OutFile $langFile -UseBasicParsing -ErrorAction Stop
              Write-Host "下载成功：$u"
              break
            } catch {
              Write-Warning "下载失败：$u -- $($_.Exception.Message)"
            }
          }
          if (-not (Test-Path $langFile)) {
            $defaultLang = Join-Path (Split-Path $langDir -Parent) "Default.isl"
            if (-not (Test-Path $defaultLang)) {
              Write-Error "未找到 Default.isl，无法生成语言文件"
            }
            Copy-Item $defaultLang $langFile -Force
            Write-Warning "使用 Default.isl 作为占位，安装器语言将 fallback 为英文。"
          }
        } else {
          Write-Host "ChineseSimplified.isl 已存在：$langFile"
        }

    - name: Create Windows installer with Inno Setup
      id: installer
      shell: pwsh
      run: |
        $arch = "x64"
        $version = "${{ inputs.app-version }}"
        $buildDir = "build\windows\x64\runner\Release"
        if (-not (Test-Path $buildDir)) {
          throw "未找到 Windows 构建输出：$buildDir"
        }

        $artifactDir = "build\windows"
        New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null

        $buildDir = (Resolve-Path $buildDir).Path
        $artifactDir = (Resolve-Path $artifactDir).Path

        $iconPath = "windows\runner\resources\app_icon.ico"
        if (-not (Test-Path $iconPath)) {
          throw "未找到安装器图标：$iconPath"
        }
        $iconPath = (Resolve-Path $iconPath).Path

        $licensePath = "LICENSE"
        if (-not (Test-Path $licensePath)) {
          throw "未找到 LICENSE 文件：$licensePath"
        }
        $licensePath = (Resolve-Path $licensePath).Path

        $installerScript = Join-Path $env:RUNNER_TEMP "NipaPlayInstaller.iss"
        $outputBaseName = "NipaPlay_${version}_Windows_${arch}_Setup"

        $assocId = "NipaPlay.VideoFile"
        $publisher = "MCDFSteve"

        @"
        #define MyAppName "NipaPlay"
        #define MyAppVersion "${version}"
        #define MyAppPublisher "${publisher}"
        #define MyAppExeName "NipaPlay.exe"
        #define MyAssocId "${assocId}"

        [Setup]
        AppId={{4A33C13F-61E9-4AB0-9F9F-4A2A6E9A6C55}}
        AppName={#MyAppName}
        AppVersion={#MyAppVersion}
        AppPublisher={#MyAppPublisher}
        DefaultDirName={code:GetAppDir}
        DefaultGroupName={#MyAppName}
        OutputDir="$artifactDir"
        OutputBaseFilename="$outputBaseName"
        SetupIconFile="$iconPath"
        UninstallDisplayIcon={app}\{#MyAppExeName}
        Compression=lzma
        SolidCompression=yes
        ArchitecturesAllowed=x64
        ArchitecturesInstallIn64BitMode=x64
        DisableWelcomePage=yes
        WizardStyle=modern
        PrivilegesRequired=lowest
        PrivilegesRequiredOverridesAllowed=dialog
        UsePreviousPrivileges=yes
        LicenseFile="$licensePath"

        [Languages]
        Name: "english"; MessagesFile: "compiler:Default.isl"
        Name: "chinesesimp"; MessagesFile: "compiler:Languages\ChineseSimplified.isl"

        [Tasks]
        Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked
        Name: "fileassoc"; Description: "将常见视频格式与 NipaPlay 关联"; Flags: unchecked

        [Files]
        Source: "$buildDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

        [Icons]
        Name: "{autoprograms}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
        Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

        [Registry]
        Root: HKCU; Subkey: "Software\Classes\.mp4"; ValueType: string; ValueName: ""; ValueData: "{#MyAssocId}"; Tasks: fileassoc; Flags: uninsdeletevalue
        Root: HKCU; Subkey: "Software\Classes\.mkv"; ValueType: string; ValueName: ""; ValueData: "{#MyAssocId}"; Tasks: fileassoc; Flags: uninsdeletevalue
        Root: HKCU; Subkey: "Software\Classes\.avi"; ValueType: string; ValueName: ""; ValueData: "{#MyAssocId}"; Tasks: fileassoc; Flags: uninsdeletevalue
        Root: HKCU; Subkey: "Software\Classes\.flv"; ValueType: string; ValueName: ""; ValueData: "{#MyAssocId}"; Tasks: fileassoc; Flags: uninsdeletevalue
        Root: HKCU; Subkey: "Software\Classes\.mov"; ValueType: string; ValueName: ""; ValueData: "{#MyAssocId}"; Tasks: fileassoc; Flags: uninsdeletevalue
        Root: HKCU; Subkey: "Software\Classes\.wmv"; ValueType: string; ValueName: ""; ValueData: "{#MyAssocId}"; Tasks: fileassoc; Flags: uninsdeletevalue
        Root: HKCU; Subkey: "Software\Classes\.m4v"; ValueType: string; ValueName: ""; ValueData: "{#MyAssocId}"; Tasks: fileassoc; Flags: uninsdeletevalue
        Root: HKCU; Subkey: "Software\Classes\.ts"; ValueType: string; ValueName: ""; ValueData: "{#MyAssocId}"; Tasks: fileassoc; Flags: uninsdeletevalue
        Root: HKCU; Subkey: "Software\Classes\.webm"; ValueType: string; ValueName: ""; ValueData: "{#MyAssocId}"; Tasks: fileassoc; Flags: uninsdeletevalue

        Root: HKCU; Subkey: "Software\Classes\{#MyAssocId}"; ValueType: string; ValueName: ""; ValueData: "NipaPlay 视频文件"; Tasks: fileassoc; Flags: uninsdeletekey
        Root: HKCU; Subkey: "Software\Classes\{#MyAssocId}\DefaultIcon"; ValueType: string; ValueName: ""; ValueData: "{app}\{#MyAppExeName},0"; Tasks: fileassoc
        Root: HKCU; Subkey: "Software\Classes\{#MyAssocId}\shell\open\command"; ValueType: string; ValueName: ""; ValueData: """{app}\{#MyAppExeName}"" ""%1"""; Tasks: fileassoc

        [Run]
        Filename: "{app}\{#MyAppExeName}"; Description: "启动 NipaPlay"; Flags: nowait postinstall skipifsilent

        [Code]
        function GetAppDir(Default: string): string;
        begin
          if IsAdminInstallMode then
            Result := ExpandConstant('{pf}\NipaPlay')
          else
            Result := ExpandConstant('{localappdata}\Programs\NipaPlay');
        end;
        "@ | Set-Content -Path $installerScript -Encoding utf8BOM

        $isccPath = Join-Path -Path "${env:ProgramFiles(x86)}" -ChildPath "Inno Setup 6\\ISCC.exe"
        if (-not (Test-Path $isccPath)) {
          throw "未找到 ISCC 可执行文件：$isccPath"
        }
        & $isccPath $installerScript

        $installerName = "${outputBaseName}.exe"
        $finalPath = "build\windows\$installerName"
        if (-not (Test-Path $finalPath)) {
          throw "Installer file was not created: $finalPath"
        }
        echo "installer_path=$finalPath" >> $env:GITHUB_OUTPUT

    - name: Update msix_version to match app version
      id: update_msix_version
      shell: pwsh
      run: |
        $appVersion = "${{ inputs.app-version }}"
        # 剥离build metadata（+及其后的内容）
        if ($appVersion -match '\+') {
          $appVersion = $appVersion -split '\+' | Select-Object -First 1
        }
        # 分割版本号部分
        $versionParts = $appVersion -split '\.'
        # 确保有4个部分
        while ($versionParts.Length -lt 4) {
          $versionParts += "0"
        }
        # 确保每部分都是0-65535的整数
        $msixVersionParts = @()
        foreach ($part in $versionParts) {
          $intPart = [int]$part
          if ($intPart -lt 0) {
            $intPart = 0
          } elseif ($intPart -gt 65535) {
            $intPart = 65535
          }
          $msixVersionParts += $intPart.ToString()
        }
        # 构建MSIX版本号
        $msixVersion = $msixVersionParts -join '.'
        Write-Host "App version: ${{ inputs.app-version }}"
        Write-Host "MSIX version: $msixVersion"
        # Update pubspec.yaml with the new msix_version
        # 读取文件内容，显式指定UTF8编码
        $content = Get-Content -Path pubspec.yaml -Encoding UTF8
        # 使用精确的正则表达式，锚定行首和缩进
        $updatedContent = $content -replace '^(\s*)msix_version: .*', "`$1msix_version: $msixVersion"
        # 检查是否成功替换
        if ($updatedContent -eq $content) {
          throw "Failed to update msix_version in pubspec.yaml"
        }
        # 写回文件，保持UTF8编码
        Set-Content -Path pubspec.yaml -Value $updatedContent -Encoding UTF8
        echo "msix_version=$msixVersion" >> $env:GITHUB_OUTPUT

    - name: Build MSIX package
      id: msix_build
      shell: pwsh
      run: |
        Write-Host "Building MSIX package using msix:create..."
        # 使用msix包的命令生成MSIX文件
        flutter pub run msix:create --store
        # 直接在Release目录中查找MSIX文件
        $msixPath = "build\windows\x64\runner\Release\NipaPlay.msix"
        if (-not (Test-Path $msixPath)) {
          throw "MSIX package was not created at: $msixPath"
        }
        Write-Host "MSIX package created at: $msixPath"
        # 复制MSIX到构建输出目录
        $destPath = "build\windows\NipaPlay_${{ inputs.app-version }}_Windows_x64.msix"
        Copy-Item -Path $msixPath -Destination $destPath -Force
        echo "msix_path=$destPath" >> $env:GITHUB_OUTPUT

    - name: List Windows build artifacts
      shell: pwsh
      run: |
        Write-Host "=== Windows Build Artifacts ==="
        Get-ChildItem "build\windows\" -File | ForEach-Object {
          $sizeKB = [math]::Round($_.Length / 1KB, 2)
          Write-Host "$($_.Name) - ${sizeKB} KB"
        }
