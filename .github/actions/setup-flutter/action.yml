name: 'Setup Flutter Environment'
description: '设置 Flutter 开发环境，包括 Java、FVM/Flutter 和获取版本信息'
inputs:
  java-version:
    description: 'Java 版本'
    required: false
    default: '21'
outputs:
  version:
    description: '从 pubspec.yaml 获取的应用版本'
    value: ${{ steps.get_version.outputs.version }}
runs:
  using: 'composite'
  steps:
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ inputs.java-version }}

    - name: Setup Dart (for FVM)
      uses: dart-lang/setup-dart@v1

    - name: Cache FVM & Pub cache (Linux/macOS)
      if: runner.os != 'Windows'
      uses: actions/cache@v4
      with:
        path: |
          ~/.fvm
          ~/.pub-cache
        key: ${{ runner.os }}-fvm-${{ hashFiles('.fvmrc') }}-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('**/gradle-wrapper.properties') }}-v1
        restore-keys: |
          ${{ runner.os }}-fvm-

    - name: Cache FVM & Pub cache (Windows)
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.USERPROFILE }}\.fvm
          ${{ env.LOCALAPPDATA }}\Pub\Cache
        key: ${{ runner.os }}-fvm-${{ hashFiles('.fvmrc') }}-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('**/gradle-wrapper.properties') }}-v1
        restore-keys: |
          ${{ runner.os }}-fvm-

    - name: Add Pub Cache bin to PATH (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "${PUB_CACHE:-$HOME/.pub-cache}/bin" >> "$GITHUB_PATH"

    - name: Add Pub Cache bin to PATH (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $pubCache = if ($env:PUB_CACHE) { $env:PUB_CACHE } else { "$env:LOCALAPPDATA\\Pub\\Cache" }
        Add-Content -Path $env:GITHUB_PATH -Value "$pubCache\\bin"
    
    - name: Install FVM
      shell: bash
      run: |
        dart pub global activate fvm

    - name: Install Flutter via FVM (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        fvm install
        fvm use --force

    - name: Install Flutter via FVM (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        fvm install
        fvm use --force

    - name: Add Flutter to PATH (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "$GITHUB_WORKSPACE/.fvm/flutter_sdk/bin" >> "$GITHUB_PATH"

    - name: Add Flutter to PATH (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Add-Content -Path $env:GITHUB_PATH -Value "$env:GITHUB_WORKSPACE\.fvm\flutter_sdk\bin"

    - name: Disable Flutter analytics
      shell: bash
      run: |
        flutter config --no-analytics
        flutter --version

    - name: Disable Swift Package Manager (force CocoaPods)
      shell: bash
      run: |
        flutter config --no-enable-swift-package-manager

    - name: Sync vendored submodules
      shell: bash
      run: |
        if [ -f .gitmodules ]; then
          git submodule sync --recursive
          git submodule update --init --recursive
        fi
    
    - name: Get app version
      id: get_version
      shell: bash
      run: |
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          # Use PowerShell for Windows to extract version
          VERSION=$(pwsh -Command "(Get-Content pubspec.yaml | Select-String -Pattern '^version:' | ForEach-Object { \$_ -replace '^version: ', '' }).Trim()")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
        else
          # Use grep/cut for Linux/macOS
          echo "version=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2)" >> $GITHUB_OUTPUT
        fi

    - name: Refresh Erika dependency
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -f "pubspec.lock" ]; then
          echo "❌ pubspec.lock 不存在，无法刷新 Erika 依赖。"
          echo "当前目录: $(pwd)"
          ls -la
          exit 1
        fi

        ERIKA_SHA="$(git ls-remote https://github.com/AimesSoft/Erika.git refs/heads/main | awk '{print $1}')"
        if [ -z "${ERIKA_SHA}" ]; then
          echo "❌ 无法解析 Erika main 最新提交。"
          exit 1
        fi

        PYTHON_BIN="python3"
        if ! command -v "${PYTHON_BIN}" >/dev/null 2>&1; then
          PYTHON_BIN="python"
        fi

        ERIKA_SHA="${ERIKA_SHA}" "${PYTHON_BIN}" - <<'PY'
        import os
        from pathlib import Path

        erika_sha = os.environ["ERIKA_SHA"]

        def update_erika_block(path, replacements):
            lines = Path(path).read_text(encoding='utf-8').splitlines(keepends=True)
            output = []
            in_block = False
            seen = set()

            for line in lines:
                if line == "  erika_flutter:\n":
                    in_block = True
                    output.append(line)
                    continue

                if in_block and line.startswith("  ") and not line.startswith("    "):
                    missing = set(replacements) - seen
                    if missing:
                        raise SystemExit(f"{path}: missing Erika fields: {sorted(missing)}")
                    in_block = False

                if in_block:
                    stripped = line.strip()
                    key = stripped.split(":", 1)[0] if ":" in stripped else ""
                    if key in replacements:
                        indent = line[: len(line) - len(line.lstrip())]
                        newline = "\n" if line.endswith("\n") else ""
                        output.append(f"{indent}{key}: {replacements[key]}{newline}")
                        seen.add(key)
                        continue

                output.append(line)

            if in_block:
                missing = set(replacements) - seen
                if missing:
                    raise SystemExit(f"{path}: missing Erika fields: {sorted(missing)}")

            Path(path).write_text("".join(output), encoding='utf-8')

        update_erika_block("pubspec.yaml", {"ref": "main"})
        update_erika_block(
            "pubspec.lock",
            {
                "ref": "main",
                "resolved-ref": f'"{erika_sha}"',
            },
        )
        PY

        echo "ERIKA_SHA=${ERIKA_SHA}" >> "$GITHUB_ENV"
        echo "Erika main resolved to ${ERIKA_SHA}."
    
    - name: Flutter Pub Get
      shell: bash
      run: |
        # Only set core.longpaths on Windows (not supported on macOS/Linux)
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          git config --global core.longpaths true
        fi
        if [ ! -f "pubspec.lock" ]; then
          echo "❌ pubspec.lock 不存在，无法使用 --enforce-lockfile。"
          echo "当前目录: $(pwd)"
          ls -la
          exit 1
        fi
        flutter pub get # 暂时移除了--enforce-lockfile
