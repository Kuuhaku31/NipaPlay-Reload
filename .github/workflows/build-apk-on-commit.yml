name: Build APK (commit trigger)

# 当 push 的 commit message 含 "build_apk" 时触发一次 APK 构建测试。
# 复用 .github/workflows/build-android.yml（与正式发布同一套构建 + 签名逻辑），
# 仅触发条件不同：发布流程走 main.yml 的 release_title 门控，这里走 commit 名。
# 构建产物以 artifact 上传（release-Android），从 Actions 运行页下载即可。
#
# 用法：git commit -m "xxx build_apk xxx" && git push
# GitHub Actions 无法在 trigger 层面按 commit message 过滤，因此每次 push 都会
# 创建一个 run，但不含 build_apk 的 commit 会在 job 级 if 处立即跳过（不消耗 CI 分钟）。

on:
  push:
    # 不限分支：方便在任意 feature 分支 push 测试 commit 触发构建。
    # 排除 tag push（tag 无 head_commit，且测试构建只关心分支 commit）。
    tags-ignore:
      - '**'
  workflow_dispatch: # 手动兜底，无 commit 时也能强制触发一次构建

permissions:
  contents: read

# 同分支新 push 取消正在跑的旧构建，省 CI 额度（测试构建无需排队）。
concurrency:
  group: build-apk-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # push: 仅当最新 commit message 含 build_apk 才构建（多 commit push 只看 head_commit）。
    # workflow_dispatch: 手动触发直接放行（无 head_commit，靠短路避免求值）。
    if: github.event_name != 'push' || contains(github.event.head_commit.message, 'build_apk')
    uses: ./.github/workflows/build-android.yml
    with:
      target-platform: android-arm64 # 测试构建只出 arm64-v8a 单 APK，省时 + 产物小下载快
    secrets: inherit # 复用 repo 的 SIGNING_KEY / KEY_STORE_PASSWORD / ALIAS / KEY_PASSWORD
