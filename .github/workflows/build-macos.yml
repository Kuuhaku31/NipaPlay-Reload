name: Build macOS

on:
  workflow_call:
    secrets:
      MACOS_CERTIFICATE_BASE64:
        description: 'macOS Distribution Certificate (Base64)'
        required: true
      MACOS_CERTIFICATE_PASSWORD:
        description: 'macOS Certificate Password'
        required: true
      APPLE_TEAM_ID:
        description: 'Apple Team ID'
        required: true
      APPLE_ID:
        description: 'Apple ID (email address)'
        required: true
      APPLE_APP_PASSWORD:
        description: 'Apple App-specific Password'
        required: true
    outputs:
      version:
        description: '应用版本号'
        value: ${{ jobs.build.outputs.version }}
      artifact-name:
        description: '构建产物名称'
        value: ${{ jobs.build.outputs.artifact-name }}

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-latest
    outputs:
      version: ${{ steps.setup.outputs.version }}
      artifact-name: release-macOS
    env:
      FVP_DEPS_URL: https://github.com/wang-bin/mdk-sdk/releases/latest/download/
      FVP_DEPS_LATEST: 1
    steps:
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          submodules: recursive

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Pre-fetch uchardet source (fallback mirror)
        shell: bash
        run: |
          set -euo pipefail
          FETCH_CACHE="$(mktemp -d)"
          echo "LIBMPV_DARWIN_FETCH_CACHE_DIR=${FETCH_CACHE}" >> "$GITHUB_ENV"
          # The Nix fetch-file helper looks for <cache-dir>/<url-basename>.
          # packages.lock.nix URL ends in uchardet-0.0.8.tar.xz, so the
          # cached file MUST be named exactly that (same format & content).
          TARGET="${FETCH_CACHE}/uchardet-0.0.8.tar.xz"
          PRIMARY="https://www.freedesktop.org/software/uchardet/releases/uchardet-0.0.8.tar.xz"
          # Try primary URL with retries (HTTP 418 is usually transient)
          for attempt in 1 2 3; do
            echo "Attempt ${attempt}: ${PRIMARY}"
            if curl -fSL --retry 3 --retry-delay 5 -o "$TARGET" "$PRIMARY" 2>/dev/null; then
              echo "Downloaded uchardet from primary URL"
              exit 0
            fi
            echo "Attempt ${attempt} failed, waiting before retry..."
            sleep 10
          done
          echo "WARNING: Could not pre-fetch uchardet; Nix build will attempt direct download."

      - name: Patch libmpv-darwin-build for target-arch HDR deps
        shell: bash
        run: |
          set -euo pipefail

          PATCH_FILE="$GITHUB_WORKSPACE/.github/patches/libmpv-darwin-build-macos-hdr-target-arch.patch"
          TARGET_FILE="third_party/libmpv-darwin-build/nix/packages/mk-out-libs/default.nix"

          if grep -q 'targetRuntimePkgs' "$TARGET_FILE"; then
            echo "libmpv-darwin-build patch already present; skipping."
          else
            git -C third_party/libmpv-darwin-build apply "$PATCH_FILE"
          fi

      - name: Build macOS libmpv xcframeworks from source
        id: build-libmpv
        shell: bash
        run: |
          set -euo pipefail

          XCODE_APP_PATH="$(dirname "$(dirname "$(xcode-select -p)")")"
          echo "Using Xcode at: ${XCODE_APP_PATH}"

          export LIBMPV_DARWIN_BUILD_PROFILE=macos-hdr
          export LIBMPV_DARWIN_MPV_SRC="$GITHUB_WORKSPACE/third_party/mpv"
          export LIBMPV_DARWIN_LIBPLACEBO_SRC="$GITHUB_WORKSPACE/third_party/libplacebo"
          export LIBMPV_DARWIN_XCODE_APP="${XCODE_APP_PATH}"

          pushd third_party/libmpv-darwin-build
          nix build --impure -L .#mk-out-archive-xcframeworks-macos-universal-video-full

          RESULT_PATH="$(readlink result)"
          if [[ "${RESULT_PATH}" != /* ]]; then
            RESULT_PATH="$(pwd)/${RESULT_PATH}"
          fi

          ARCHIVE_PATH="$(find "${RESULT_PATH}" -type f -name '*.tar.gz' | head -n 1)"
          if [[ -z "${ARCHIVE_PATH}" ]]; then
            echo "Failed to locate xcframework archive under ${RESULT_PATH}" >&2
            find "${RESULT_PATH}" -maxdepth 3 -print >&2 || true
            exit 1
          fi

          popd

          ARCHIVE_SHA256="$(shasum -a 256 "${ARCHIVE_PATH}" | awk '{print $1}')"

          {
            echo "LIBMPV_DARWIN_BUILD_PROFILE=macos-hdr"
            echo "LIBMPV_DARWIN_MPV_SRC=$GITHUB_WORKSPACE/third_party/mpv"
            echo "LIBMPV_DARWIN_LIBPLACEBO_SRC=$GITHUB_WORKSPACE/third_party/libplacebo"
            echo "LIBMPV_DARWIN_XCODE_APP=${XCODE_APP_PATH}"
            echo "LIBMPV_DARWIN_XCFRAMEWORKS_ARCHIVE=${ARCHIVE_PATH}"
          } >> "$GITHUB_ENV"

          echo "archive-path=${ARCHIVE_PATH}" >> "$GITHUB_OUTPUT"
          echo "archive-sha256=${ARCHIVE_SHA256}" >> "$GITHUB_OUTPUT"

      - name: Reset vendored media-kit macOS frameworks
        shell: bash
        run: |
          set -euo pipefail

          MACOS_LIBS_DIR="third_party/media-kit-upstream/libs/macos/media_kit_libs_macos_video/macos"
          mkdir -p "${MACOS_LIBS_DIR}/Frameworks"
          find "${MACOS_LIBS_DIR}/Frameworks" -maxdepth 1 -type d -name '*.xcframework' -exec rm -rf {} +
          rm -rf "${MACOS_LIBS_DIR}/Frameworks/.symlinks"
          rm -rf "${MACOS_LIBS_DIR}/.cache"

      - name: Cache macOS Pods
        uses: actions/cache@v3
        with:
          path: macos/Pods
          key: macos-pods-${{ hashFiles('macos/Podfile.lock') }}-${{ steps.build-libmpv.outputs.archive-sha256 }}
          restore-keys: |
            macos-pods-${{ hashFiles('macos/Podfile.lock') }}-
      
      - name: Setup Flutter Environment
        id: setup
        uses: ./.github/actions/setup-flutter

      - name: Generate build info json
        shell: bash
        run: python3 .github/workflows/scripts/generate-build-info-json.py assets/build_info.json
      
      - name: Build macOS DMG
        uses: ./.github/actions/build-macos
        with:
          app-version: ${{ steps.setup.outputs.version }}
          macos-certificate-base64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          macos-certificate-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          apple-team-id: ${{ secrets.APPLE_TEAM_ID }}
          apple-id: ${{ secrets.APPLE_ID }}
          apple-app-password: ${{ secrets.APPLE_APP_PASSWORD }}
      
      - name: Clean CocoaPods Pods (optional)
        run: |
          pod cache clean mdk || true
          rm -rf macos/Pods ios/Pods
      
      - name: Clean flutter pub cache
        run: flutter pub cache clean
      
      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macOS
          path: NipaPlay_*_macOS_Universal.dmg
