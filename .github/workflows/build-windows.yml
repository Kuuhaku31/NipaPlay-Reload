name: Build Windows

on:
  workflow_call:
    outputs:
      version:
        description: '应用版本号'
        value: ${{ jobs.build.outputs.version }}
      artifact-name:
        description: '构建产物名称'
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build Windows Package
    runs-on: windows-latest
    outputs:
      version: ${{ steps.setup.outputs.version }}
      artifact-name: release-Windows-x64
    env:
      FVP_DEPS_URL: https://sourceforge.net/projects/mdk-sdk/files/nightly
      # Keep FVP_DEPS_LATEST unset (treated as 0): with it on, fvp's deps.cmake
      # re-fetches mdk-sdk's .md5 from the SourceForge web frontend during
      # `flutter build windows`, and SourceForge serves an HTML interstitial to
      # CI runners that fatally breaks extraction. The mdk-sdk is pre-downloaded
      # by the build-windows action, so fvp must trust it and skip downloads.
      FVP_DEPS_LATEST: 0
      ERIKA_PREBUILT: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          submodules: recursive
      
      - name: Setup Flutter Environment
        id: setup
        uses: ./.github/actions/setup-flutter

      - name: Generate build info json
        shell: pwsh
        run: python .github/workflows/scripts/generate-build-info-json.py assets/build_info.json
      
      - name: Build Windows Package
        uses: ./.github/actions/build-windows
        with:
          app-version: ${{ steps.setup.outputs.version }}
      
      - name: Clean flutter pub cache
        run: flutter pub cache clean
      
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-Windows-x64
          path: |
            build/windows/*
            !build/windows/symbols-windows

      - name: Upload Dart debug symbols (for de-obfuscating crash stacks)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dart-symbols-Windows
          path: build/symbols-windows/
          if-no-files-found: warn
