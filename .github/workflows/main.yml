name: Build & Release (Modular)

on:
  workflow_dispatch:
    inputs:
      release_title:
        description: 'Release title, e.g. 2026.0430'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

# If previous workflow is still running, we push again, we will cancel the previous workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  Gatekeeper:
    name: Check Release Input
    runs-on: ubuntu-latest
    outputs:
      triggered: ${{ steps.check.outputs.triggered }}
      release_title: ${{ steps.check.outputs.release_title }}
    steps:
      - name: Check release title
        id: check
        env:
          RELEASE_TITLE: ${{ inputs.release_title }}
        run: |
          if [[ "$RELEASE_TITLE" =~ ^[0-9]{4}\.[0-9]{4}$ ]]; then
            echo "✅ Release title accepted."
            echo "triggered=true" >> $GITHUB_OUTPUT
            echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          else
            echo "🛑 release_title must match YYYY.MMDD, for example 2026.0430."
            exit 1
          fi

  # 并行构建所有平台，支持fail-fast: false策略
  Build-Android:
    name: Build Android
    needs: Gatekeeper
    if: needs.Gatekeeper.outputs.triggered == 'true'
    uses: ./.github/workflows/build-android.yml
    secrets:
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      ALIAS: ${{ secrets.ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

  Build-macOS:
    name: Build macOS
    needs: Gatekeeper
    if: needs.Gatekeeper.outputs.triggered == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/build-macos.yml
    secrets:
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

  Build-Windows:
    name: Build Windows
    needs: Gatekeeper
    if: needs.Gatekeeper.outputs.triggered == 'true'
    uses: ./.github/workflows/build-windows.yml

  Build-Linux:
    name: Build Linux
    needs: Gatekeeper
    if: needs.Gatekeeper.outputs.triggered == 'true'
    uses: ./.github/workflows/build-linux.yml

  Publish:
    name: Publish Release
    needs: [Gatekeeper, Build-Android, Build-macOS, Build-Windows, Build-Linux]
    if: needs.Gatekeeper.outputs.triggered == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to get all commit history for changelog

      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
      
      - name: List all Artifacts
        run: ls -R /tmp/artifacts

      - name: Generate Changelog with AI
        id: ai_changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_URL: ${{ vars.RELEASE_AI_API_URL }}
          AI_MODEL: ${{ vars.RELEASE_AI_MODEL || 'gemini-3-flash-preview' }}
          AI_API_TOKEN: ${{ secrets.RELEASE_AI_TOKEN }}
        run: |
          set -euo pipefail

          AI_API_URL=$(printf '%s' "$AI_API_URL" | tr -d '\r\n' | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')
          AI_MODEL=$(printf '%s' "$AI_MODEL" | tr -d '\r\n' | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')
          AI_API_TOKEN=$(printf '%s' "$AI_API_TOKEN" | tr -d '\r\n')

          if [ -z "${AI_API_URL}" ]; then
            echo "RELEASE_AI_API_URL repository variable is required."
            exit 1
          fi

          if [ -z "${AI_API_TOKEN}" ]; then
            echo "RELEASE_AI_TOKEN secret is required."
            exit 1
          fi

          echo "Using AI endpoint host: $(echo "$AI_API_URL" | sed -E 's#^([^:]+://[^/]+).*$#\1#')"
          echo "Using AI model: ${AI_MODEL}"

          # Install jq to parse JSON response
          sudo apt-get install -y jq

          # Get the latest and previous tag. If no previous tag, use the first commit.
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous tag found. Using full history."
            COMMIT_RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD"
          else
            echo "Last release was at tag: $LATEST_TAG"
            COMMIT_RANGE="$LATEST_TAG..HEAD"
          fi

          # Get commit history since the last tag
          MAX_COMMITS=200
          COMMITS_JSON=$(git log "$COMMIT_RANGE" --pretty=format:'%H%x1f%h%x1f%s%x1f%an%x1f%ae%x1e' -n "$MAX_COMMITS" | jq -Rs '
            split("\u001e")
            | map(gsub("^[\\r\\n]+|[\\r\\n]+$"; ""))
            | map(select(length > 0))
            | map(split("\u001f") | {sha: .[0], short_sha: .[1], subject: .[2], author_name: .[3], author_email: .[4]})
          ')
          if [ "$(echo "$COMMITS_JSON" | jq 'length')" -eq 0 ]; then
            echo "No new commits since last tag. Using latest commit message as changelog."
            COMMITS_JSON=$(git log -1 --pretty=format:'%H%x1f%h%x1f%s%x1f%an%x1f%ae%x1e' | jq -Rs '
              split("\u001e")
              | map(gsub("^[\\r\\n]+|[\\r\\n]+$"; ""))
              | map(select(length > 0))
              | map(split("\u001f") | {sha: .[0], short_sha: .[1], subject: .[2], author_name: .[3], author_email: .[4]})
            ')
          fi

          PR_GROUPS_JSON='{}'
          DIRECT_COMMITS_JSON='[]'

          enrich_commit_author() {
            local commit_json="$1"
            local sha
            local short_sha
            local commit_response
            local author_login
            local author_url

            sha=$(echo "$commit_json" | jq -r '.sha' | tr -d '\r\n')
            short_sha=$(echo "$commit_json" | jq -r '.short_sha' | tr -d '\r\n')

            if commit_response=$(curl -fsS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${sha}"); then
              author_login=$(echo "$commit_response" | jq -r '.author.login // empty')
              author_url=$(echo "$commit_response" | jq -r '.author.html_url // empty')
              if [ -n "$author_login" ]; then
                commit_json=$(echo "$commit_json" | jq \
                  --arg author_login "$author_login" \
                  --arg author_url "$author_url" \
                  '. + {author_login: $author_login, author_url: $author_url}')
              fi
            else
              echo "Warning: Failed to query author for commit ${short_sha}." >&2
            fi

            echo "$commit_json"
          }

          add_direct_commit() {
            local commit_json="$1"
            DIRECT_COMMITS_JSON=$(echo "$DIRECT_COMMITS_JSON" | jq --argjson commit "$commit_json" '. + [$commit]')
          }

          while IFS= read -r COMMIT; do
            COMMIT=$(enrich_commit_author "$COMMIT")
            SHA=$(echo "$COMMIT" | jq -r '.sha' | tr -d '\r\n')
            SHORT_SHA=$(echo "$COMMIT" | jq -r '.short_sha' | tr -d '\r\n')

            if ! PRS_JSON=$(curl -fsS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${SHA}/pulls"); then
              echo "Warning: Failed to query PRs for commit ${SHORT_SHA}. Treating it as a direct commit."
              add_direct_commit "$COMMIT"
              continue
            fi

            PR_JSON=$(echo "$PRS_JSON" | jq -c --arg branch "${GITHUB_REF_NAME}" '
              map(select(.base.ref == $branch)) as $matching
              | if ($matching | length) > 0 then $matching[0] else .[0] end
            ')

            if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
              add_direct_commit "$COMMIT"
              continue
            fi

            PR_GROUPS_JSON=$(echo "$PR_GROUPS_JSON" | jq --argjson pr "$PR_JSON" --argjson commit "$COMMIT" '
              ($pr.number | tostring) as $number
              | if has($number) then
                  .[$number].commits += [$commit]
                else
                  .[$number] = {
                    number: $pr.number,
                    title: $pr.title,
                    url: $pr.html_url,
                    author: $pr.user.login,
                    merged_by: ($pr.merged_by.login // null),
                    body: ($pr.body // ""),
                    base: $pr.base.ref,
                    merged_at: $pr.merged_at,
                    commits: [$commit]
                  }
                end
            ')
          done < <(echo "$COMMITS_JSON" | jq -c '.[]')

          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          PR_GROUPS_ARRAY=$(echo "$PR_GROUPS_JSON" | jq --arg repo_url "$REPO_URL" '
            [
              .[] as $pr
              | ([
                  $pr.title,
                  $pr.body
                ] + ($pr.commits | map(.subject // ""))
                | map(. // "")
                | join("\n")
                | [scan("#[0-9]+")]
                | unique
                | map(select(. != ("#" + ($pr.number | tostring))))
                | map({number: (.[1:] | tonumber), ref: ., url: ($repo_url + "/issues/" + .[1:])})
              ) as $issue_refs
              | $pr + {issue_refs: $issue_refs}
            ]
            | sort_by(.number)')
          DIRECT_COMMITS_JSON=$(echo "$DIRECT_COMMITS_JSON" | jq --arg repo_url "$REPO_URL" '
            map(
              . as $commit
              | ($commit.subject // ""
                | [scan("#[0-9]+")]
                | unique
                | map({number: (.[1:] | tonumber), ref: ., url: ($repo_url + "/issues/" + .[1:])})
              ) as $issue_refs
              | $commit + {issue_refs: $issue_refs}
            )')
          CONTRIBUTORS_JSON=$(jq -n \
            --argjson prs "$PR_GROUPS_ARRAY" \
            --argjson direct_commits "$DIRECT_COMMITS_JSON" \
            '[
              $prs[].author,
              $prs[].merged_by,
              $prs[].commits[]?.author_login,
              $direct_commits[].author_login
            ]
            | map(select(. != null and . != ""))
            | map(select(test("\\[bot\\]$") | not))
            | unique')

          CHANGELOG_CONTEXT=$(jq -n \
            --arg latest_tag "$LATEST_TAG" \
            --arg commit_range "$COMMIT_RANGE" \
            --argjson prs "$PR_GROUPS_ARRAY" \
            --argjson direct_commits "$DIRECT_COMMITS_JSON" \
            --argjson contributors "$CONTRIBUTORS_JSON" \
            '{
              latest_tag: $latest_tag,
              commit_range: $commit_range,
              pr_groups: $prs,
              direct_commits: $direct_commits,
              contributors: $contributors
            }')

          echo "Found $(echo "$CHANGELOG_CONTEXT" | jq '.pr_groups | length') PR group(s), $(echo "$CHANGELOG_CONTEXT" | jq '.direct_commits | length') direct commit(s), and $(echo "$CHANGELOG_CONTEXT" | jq '.contributors | length') contributor(s) for changelog generation."

          # Build prompt separately to avoid jq escaping issues
          RELEASE_PROMPT="你是一个 NipaPlay 发布小助手。NipaPlay 是一个跨平台弹幕视频播放器，重点包括本地/流媒体播放、番剧媒体库、弹幕、字幕、多平台桌面与移动端体验。请根据以下自上次发布以来的 GitHub PR 分组信息，生成面向普通用户的中文 Markdown 更新日志。请以 PR 为发布单元进行总结，每个 PR 最多作为一个主要条目出现；PR 下的 commits 仅用于理解实现范围、验证细节和识别贡献者，不要把同一个 PR 内部的 commit 拆成多个独立更新。尤其不要把 PR 开发过程中修复该 PR 自己引入的问题、重构过程中的中间修正、测试/验证脚本、临时 CI 修复，单独写成面向用户的 Bug 修复；只有当 PR 标题、PR 正文或整体变更明确表明它修复了已发布版本中用户可见的问题时，才放入“Bug 修复”。如果某个 PR 同时包含新功能和为了该功能完成的内部修复，请把这些内部修复合并到该 PR 的说明中，不要另列。请在标题后用 Markdown 链接标注 PR，例如：**功能名称** ([#123](https://...))，不要再额外输出“查看详情”或裸 URL。输入中的 issue_refs 是从 PR 标题、PR 正文和 commit subject 中预先解析出的相关 Issue 引用；如果某个条目有 issue_refs，请在该条目末尾自然标注相关 Issue，例如：关联：[#395](https://...)。不要臆造 issue，不要把当前 PR 编号重复当作 issue。direct_commits 仅代表未关联 PR 的提交；只有对用户可见时才列出，否则放入“维护与发布流程”简短概括。请把面向用户的新功能、体验改进和 bug 修复放在前面；CI、构建、发布流程、依赖维护、版本号 bump 等内部维护内容请放在“维护与发布流程”小节中简短概括，不要抢占主要篇幅；不要单独把纯版本号 bump 当成用户更新。不要生成 Contributors 或贡献者小节，工作流会自动追加。不需要使用代码框包裹，不要使用 emoji。以下是结构化变更信息："
          RELEASE_PROMPT="${RELEASE_PROMPT}"$'\n'"$(echo "$CHANGELOG_CONTEXT" | jq '.')"$'\n'"请直接返回 Markdown 格式的更新日志内容，不要包含其他额外的话，不要使用emoji。"

          # Create the JSON payload using jq
          JSON_PAYLOAD=$(jq -n \
            --arg model "$AI_MODEL" \
            --arg prompt "$RELEASE_PROMPT" \
            '{
              model: $model,
              temperature: 0.5,
              stream: false,
              messages: [
                {
                  role: "user",
                  content: $prompt
                }
              ]
            }')

          # Call the AI API and save the response
          echo "Sending request to AI for changelog summary..."
          AI_RESPONSE=$(curl -fsS --retry 2 --max-time 180 -X POST "$AI_API_URL" \
            -H "Authorization: Bearer ${AI_API_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$JSON_PAYLOAD")

          # Extract the content and write to a file.
          echo "$AI_RESPONSE" | jq -er '.choices[0].message.content' > release_notes.md

          CONTRIBUTORS_LINE=$(echo "$CHANGELOG_CONTEXT" | jq -r '.contributors | map("@" + .) | join(", ")')
          if [ -n "$CONTRIBUTORS_LINE" ]; then
            {
              echo ""
              echo "## Contributors"
              echo ""
              echo "$CONTRIBUTORS_LINE"
            } >> release_notes.md
          fi
          
          echo "--- Generated Release Notes ---"
          cat release_notes.md
          echo "-------------------------------"

      - name: Upload to release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.Build-Android.outputs.version }}
          name: Release v${{ needs.Build-Android.outputs.version }}
          bodyFile: "release_notes.md"
          allowUpdates: true
          artifacts: /tmp/artifacts/release-Android/*.apk,/tmp/artifacts/release-macOS/*.dmg,/tmp/artifacts/release-macOS/*.zip,/tmp/artifacts/release-macOS/*.pkg,/tmp/artifacts/release-Windows-x64/*.zip,/tmp/artifacts/release-Windows-x64/*.exe,/tmp/artifacts/release-Windows-x64/*.msix,/tmp/artifacts/release-Linux-amd64/*.deb,/tmp/artifacts/release-Linux-amd64/*.AppImage,/tmp/artifacts/release-Linux-amd64/*.tar.gz,/tmp/artifacts/release-Linux-amd64/*.rpm,/tmp/artifacts/release-Linux-arm64/*.deb,/tmp/artifacts/release-Linux-arm64/*.tar.gz,/tmp/artifacts/release-Linux-arm64/*.rpm
          artifactErrorsFailBuild: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}

  UpdateVersion:
    needs: [Publish]
    if: success() # This job runs only if Publish job succeeds
    runs-on: ubuntu-latest
    steps:
      - name: Create release bot token
        id: release_bot_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.release_bot_token.outputs.token }}
          fetch-depth: 0

      - name: Get release bot user id
        id: release_bot_user
        env:
          GH_TOKEN: ${{ steps.release_bot_token.outputs.token }}
        run: echo "id=$(gh api "/users/${{ steps.release_bot_token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
          
      - name: Update version
        run: |
          git config --global user.name '${{ steps.release_bot_token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.release_bot_user.outputs.id }}+${{ steps.release_bot_token.outputs.app-slug }}[bot]@users.noreply.github.com'
          
          # Get latest code
          git fetch origin refs/heads/main:refs/remotes/origin/main
          git checkout -B main refs/remotes/origin/main
          
          # Read and update version
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2)
          echo "Current version: $CURRENT_VERSION"
          
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "New version: $NEW_VERSION"
          
          # Update pubspec.yaml
          sed -i "s/^version: .*$/version: $NEW_VERSION/" pubspec.yaml
          
          # Commit and push changes
          git add pubspec.yaml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin refs/heads/main

  UpdateHomebrewTap:
    name: Update Homebrew Tap
    needs: [Publish, Build-macOS]
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Homebrew Tap repository
        uses: actions/checkout@v4
        with:
          repository: AimesSoft/homebrew-nipaplay-reload
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Get Version
        id: get_version
        run: echo "version=${{ needs.Build-macOS.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Calculate SHA256 of the DMG
        id: shasum
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          DMG_URL="https://github.com/AimesSoft/NipaPlay-Reload/releases/download/v${VERSION}/NipaPlay_${VERSION}_macOS_Universal.dmg"
          
          echo "Downloading DMG from ${DMG_URL}..."
          curl -sL -o NipaPlay.dmg "${DMG_URL}"
          
          echo "Calculating SHA256..."
          SHA256=$(shasum -a 256 NipaPlay.dmg | awk '{print $1}')
          
          echo "SHA256 is ${SHA256}"
          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT

      - name: Update Cask file
        run: |
          CASK_FILE="homebrew-tap/Casks/nipaplay-reload.rb"
          VERSION="${{ steps.get_version.outputs.version }}"
          SHA256="${{ steps.shasum.outputs.sha256 }}"
          
          echo "Updating ${CASK_FILE} to version ${VERSION}"
          
          sed -i 's/^  version ".*"/  version "'"${VERSION}"'"/' "${CASK_FILE}"
          sed -i 's/^  sha256 ".*"/  sha256 "'"${SHA256}"'"/' "${CASK_FILE}"
          
          # Also update the zap trash paths to use correct Bundle ID
          sed -i 's|"~/Library/Preferences/io\.github\.mcdfsteve\.nipaplay-reload\.plist"|"~/Library/Preferences/com.aimessoft.nipaplay.plist"|g' "${CASK_FILE}"
          sed -i 's|"~/Library/Saved Application State/io\.github\.mcdfsteve\.nipaplay-reload\.savedState"|"~/Library/Saved Application State/com.aimessoft.nipaplay.savedState"|g' "${CASK_FILE}"
          sed -i 's|"~/Library/Application Support/NipaPlay-Reload"|"~/Library/Application Support/NipaPlay"|g' "${CASK_FILE}"
          
          echo "--- Cask file content after update ---"
          cat "${CASK_FILE}"
          echo "--------------------------------------"

      - name: Commit and push Cask update
        run: |
          cd homebrew-tap
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [[ -z $(git status -s) ]]; then
            echo "No changes to the Cask file. Skipping commit."
          else
            echo "Changes detected. Committing and pushing..."
            git add Casks/nipaplay-reload.rb
            git commit -m "Update nipaplay-reload cask to v${{ steps.get_version.outputs.version }}"
            git push
            echo "Push successful."
          fi
