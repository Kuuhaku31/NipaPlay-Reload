name: Release Notes Dry Run

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Optional tag or commit to compare from. Leave empty to use the latest tag.'
        required: false
        type: string
      max_commits:
        description: 'Maximum commits to include in the dry run.'
        default: '200'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  generate:
    name: Generate Release Notes Preview
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
      AI_API_URL: ${{ vars.RELEASE_AI_API_URL }}
      AI_MODEL: ${{ vars.RELEASE_AI_MODEL || 'gemini-3-flash-preview' }}
      AI_API_TOKEN: ${{ secrets.RELEASE_AI_TOKEN }}
      CHANGELOG_BASE_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes preview
        run: |
          set -euo pipefail

          AI_API_URL=$(printf '%s' "$AI_API_URL" | tr -d '\r\n' | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')
          AI_MODEL=$(printf '%s' "$AI_MODEL" | tr -d '\r\n' | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')
          AI_API_TOKEN=$(printf '%s' "$AI_API_TOKEN" | tr -d '\r\n')

          if [ -z "${AI_API_URL}" ]; then
            echo "RELEASE_AI_API_URL repository variable is required."
            exit 1
          fi

          if [ -z "${AI_API_TOKEN}" ]; then
            echo "RELEASE_AI_TOKEN secret is required."
            exit 1
          fi

          echo "Using AI endpoint host: $(echo "$AI_API_URL" | sed -E 's#^([^:]+://[^/]+).*$#\1#')"
          echo "Using AI model: ${AI_MODEL}"

          if ! [[ "${{ inputs.max_commits }}" =~ ^[0-9]+$ ]]; then
            echo "max_commits must be a positive integer."
            exit 1
          fi

          sudo apt-get install -y jq

          BASE_REF="${{ inputs.base_ref }}"
          if [ -n "$BASE_REF" ]; then
            echo "Using manually selected base ref: $BASE_REF"
            COMMIT_RANGE="$BASE_REF..HEAD"
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LATEST_TAG" ]; then
              echo "No previous tag found. Using full history."
              COMMIT_RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD"
            else
              echo "Last release was at tag: $LATEST_TAG"
              COMMIT_RANGE="$LATEST_TAG..HEAD"
            fi
          fi

          MAX_COMMITS="${{ inputs.max_commits }}"
          COMMITS_JSON=$(git log "$COMMIT_RANGE" --pretty=format:'%H%x1f%h%x1f%s%x1f%an%x1f%ae%x1e' -n "$MAX_COMMITS" | jq -Rs '
            split("\u001e")
            | map(gsub("^[\\r\\n]+|[\\r\\n]+$"; ""))
            | map(select(length > 0))
            | map(split("\u001f") | {sha: .[0], short_sha: .[1], subject: .[2], author_name: .[3], author_email: .[4]})
          ')
          if [ "$(echo "$COMMITS_JSON" | jq 'length')" -eq 0 ]; then
            echo "No new commits since the selected base. Using latest commit message as changelog."
            COMMITS_JSON=$(git log -1 --pretty=format:'%H%x1f%h%x1f%s%x1f%an%x1f%ae%x1e' | jq -Rs '
              split("\u001e")
              | map(gsub("^[\\r\\n]+|[\\r\\n]+$"; ""))
              | map(select(length > 0))
              | map(split("\u001f") | {sha: .[0], short_sha: .[1], subject: .[2], author_name: .[3], author_email: .[4]})
            ')
          fi

          PR_GROUPS_JSON='{}'
          DIRECT_COMMITS_JSON='[]'

          enrich_commit_author() {
            local commit_json="$1"
            local sha
            local short_sha
            local commit_response
            local author_login
            local author_url

            sha=$(echo "$commit_json" | jq -r '.sha' | tr -d '\r\n')
            short_sha=$(echo "$commit_json" | jq -r '.short_sha' | tr -d '\r\n')

            if commit_response=$(curl -fsS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${sha}"); then
              author_login=$(echo "$commit_response" | jq -r '.author.login // empty')
              author_url=$(echo "$commit_response" | jq -r '.author.html_url // empty')
              if [ -n "$author_login" ]; then
                commit_json=$(echo "$commit_json" | jq \
                  --arg author_login "$author_login" \
                  --arg author_url "$author_url" \
                  '. + {author_login: $author_login, author_url: $author_url}')
              fi
            else
              echo "Warning: Failed to query author for commit ${short_sha}."
            fi

            echo "$commit_json"
          }

          add_direct_commit() {
            local commit_json="$1"
            DIRECT_COMMITS_JSON=$(echo "$DIRECT_COMMITS_JSON" | jq --argjson commit "$commit_json" '. + [$commit]')
          }

          while IFS= read -r COMMIT; do
            COMMIT=$(enrich_commit_author "$COMMIT")
            SHA=$(echo "$COMMIT" | jq -r '.sha' | tr -d '\r\n')
            SHORT_SHA=$(echo "$COMMIT" | jq -r '.short_sha' | tr -d '\r\n')

            if ! PRS_JSON=$(curl -fsS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${SHA}/pulls"); then
              echo "Warning: Failed to query PRs for commit ${SHORT_SHA}. Treating it as a direct commit."
              add_direct_commit "$COMMIT"
              continue
            fi

            PR_JSON=$(echo "$PRS_JSON" | jq -c --arg branch "$CHANGELOG_BASE_BRANCH" '
              map(select(.base.ref == $branch)) as $matching
              | if ($matching | length) > 0 then $matching[0] else .[0] end
            ')

            if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
              add_direct_commit "$COMMIT"
              continue
            fi

            PR_GROUPS_JSON=$(echo "$PR_GROUPS_JSON" | jq --argjson pr "$PR_JSON" --argjson commit "$COMMIT" '
              ($pr.number | tostring) as $number
              | if has($number) then
                  .[$number].commits += [$commit]
                else
                  .[$number] = {
                    number: $pr.number,
                    title: $pr.title,
                    url: $pr.html_url,
                    author: $pr.user.login,
                    merged_by: ($pr.merged_by.login // null),
                    body: ($pr.body // ""),
                    base: $pr.base.ref,
                    merged_at: $pr.merged_at,
                    commits: [$commit]
                  }
                end
            ')
          done < <(echo "$COMMITS_JSON" | jq -c '.[]')

          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          PR_GROUPS_ARRAY=$(echo "$PR_GROUPS_JSON" | jq --arg repo_url "$REPO_URL" '
            [
              .[] as $pr
              | ([
                  $pr.title,
                  $pr.body
                ] + ($pr.commits | map(.subject // ""))
                | map(. // "")
                | join("\n")
                | [scan("#[0-9]+")]
                | unique
                | map(select(. != ("#" + ($pr.number | tostring))))
                | map({number: (.[1:] | tonumber), ref: ., url: ($repo_url + "/issues/" + .[1:])})
              ) as $issue_refs
              | $pr + {issue_refs: $issue_refs}
            ]
            | sort_by(.number)')
          DIRECT_COMMITS_JSON=$(echo "$DIRECT_COMMITS_JSON" | jq --arg repo_url "$REPO_URL" '
            map(
              . as $commit
              | ($commit.subject // ""
                | [scan("#[0-9]+")]
                | unique
                | map({number: (.[1:] | tonumber), ref: ., url: ($repo_url + "/issues/" + .[1:])})
              ) as $issue_refs
              | $commit + {issue_refs: $issue_refs}
            )')
          CONTRIBUTORS_JSON=$(jq -n \
            --argjson prs "$PR_GROUPS_ARRAY" \
            --argjson direct_commits "$DIRECT_COMMITS_JSON" \
            '[
              $prs[].author,
              $prs[].merged_by,
              $prs[].commits[]?.author_login,
              $direct_commits[].author_login
            ]
            | map(select(. != null and . != ""))
            | map(select(test("\\[bot\\]$") | not))
            | unique')

          CHANGELOG_CONTEXT=$(jq -n \
            --arg commit_range "$COMMIT_RANGE" \
            --argjson prs "$PR_GROUPS_ARRAY" \
            --argjson direct_commits "$DIRECT_COMMITS_JSON" \
            --argjson contributors "$CONTRIBUTORS_JSON" \
            '{
              commit_range: $commit_range,
              pr_groups: $prs,
              direct_commits: $direct_commits,
              contributors: $contributors
            }')

          echo "Found $(echo "$CHANGELOG_CONTEXT" | jq '.pr_groups | length') PR group(s), $(echo "$CHANGELOG_CONTEXT" | jq '.direct_commits | length') direct commit(s), and $(echo "$CHANGELOG_CONTEXT" | jq '.contributors | length') contributor(s) for release notes preview."

          RELEASE_PROMPT="你是一个 NipaPlay 发布小助手。NipaPlay 是一个跨平台弹幕视频播放器，重点包括本地/流媒体播放、番剧媒体库、弹幕、字幕、多平台桌面与移动端体验。请根据以下自上次发布以来的 GitHub PR 分组信息，生成面向普通用户的中文 Markdown 更新日志。请以 PR 为发布单元进行总结，每个 PR 最多作为一个主要条目出现；PR 下的 commits 仅用于理解实现范围、验证细节和识别贡献者，不要把同一个 PR 内部的 commit 拆成多个独立更新。尤其不要把 PR 开发过程中修复该 PR 自己引入的问题、重构过程中的中间修正、测试/验证脚本、临时 CI 修复，单独写成面向用户的 Bug 修复；只有当 PR 标题、PR 正文或整体变更明确表明它修复了已发布版本中用户可见的问题时，才放入“Bug 修复”。如果某个 PR 同时包含新功能和为了该功能完成的内部修复，请把这些内部修复合并到该 PR 的说明中，不要另列。请在标题后用 Markdown 链接标注 PR，例如：**功能名称** ([#123](https://...))，不要再额外输出“查看详情”或裸 URL。输入中的 issue_refs 是从 PR 标题、PR 正文和 commit subject 中预先解析出的相关 Issue 引用；如果某个条目有 issue_refs，请在该条目末尾自然标注相关 Issue，例如：关联：[#395](https://...)。不要臆造 issue，不要把当前 PR 编号重复当作 issue。direct_commits 仅代表未关联 PR 的提交；只有对用户可见时才列出，否则放入“维护与发布流程”简短概括。请把面向用户的新功能、体验改进和 bug 修复放在前面；CI、构建、发布流程、依赖维护、版本号 bump 等内部维护内容请放在“维护与发布流程”小节中简短概括，不要抢占主要篇幅；不要单独把纯版本号 bump 当成用户更新。不要生成 Contributors 或贡献者小节，工作流会自动追加。不需要使用代码框包裹，不要使用 emoji。以下是结构化变更信息："
          RELEASE_PROMPT="${RELEASE_PROMPT}"$'\n'"$(echo "$CHANGELOG_CONTEXT" | jq '.')"$'\n'"请直接返回 Markdown 格式的更新日志内容，不要包含其他额外的话，不要使用emoji。"

          JSON_PAYLOAD=$(jq -n \
            --arg model "$AI_MODEL" \
            --arg prompt "$RELEASE_PROMPT" \
            '{
              model: $model,
              temperature: 0.5,
              stream: false,
              messages: [
                {
                  role: "user",
                  content: $prompt
                }
              ]
            }')

          echo "Sending request to AI for release notes preview..."
          AI_RESPONSE=$(curl -fsS --retry 2 --max-time 180 -X POST "$AI_API_URL" \
            -H "Authorization: Bearer ${AI_API_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$JSON_PAYLOAD")

          echo "$AI_RESPONSE" | jq -er '.choices[0].message.content' > release_notes.md

          CONTRIBUTORS_LINE=$(echo "$CHANGELOG_CONTEXT" | jq -r '.contributors | map("@" + .) | join(", ")')
          if [ -n "$CONTRIBUTORS_LINE" ]; then
            {
              echo ""
              echo "## Contributors"
              echo ""
              echo "$CONTRIBUTORS_LINE"
            } >> release_notes.md
          fi

          {
            echo "## Release Notes Preview"
            echo ""
            cat release_notes.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release notes preview
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-preview
          path: release_notes.md
