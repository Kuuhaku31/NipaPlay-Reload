name: rust_lib_nipaplay
description: "Utility to build Rust code"
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  ffi: ^2.0.2
  ffigen: ^11.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.flutter_rust_bridge.rust_lib_nipaplay
        pluginClass: RustLibNipaplayPlugin
      ios:
        pluginClass: RustLibNipaplayPlugin
      linux:
        pluginClass: RustLibNipaplayPlugin
        fileName: rust_lib_nipaplay_plugin.cc
      macos:
        pluginClass: RustLibNipaplayPlugin
      windows:
        pluginClass: RustLibNipaplayPluginCApi
        fileName: rust_lib_nipaplay_plugin_c_api.cpp
